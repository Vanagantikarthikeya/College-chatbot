<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Helpdesk Chatbot</title>
    <!-- Link to the external CSS stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="chatbot-container">
        <!-- Header Section -->
        <header class="chat-header">
            <h1>🎓 College Helpdesk</h1>
            <p>Ask me about Admissions, Exams, or Placements</p>
        </header>

        <!-- Chat Area Section -->
        <div id="chatbox" class="chat-box">
            <!-- Messages will be dynamically inserted here by JavaScript -->
            <div class="bot-message">
                <p>Hello! I am your College Assistant. How can I help you today?</p>
            </div>
        </div>

        <!-- Input Section -->
        <footer class="chat-input-area">
            <form id="chat-form">
                <input type="text" id="user-input" name="msg" placeholder="Type your query here..." required autocomplete="off">
                <button type="submit" id="send-btn">Send</button>
            </form>
        </footer>
    </div>

    <!-- Link to the external JavaScript file -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
