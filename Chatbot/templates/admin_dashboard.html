<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - College Helpdesk</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0F172A;
            color: #ffffff;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1,
        h2,
        h3 {
            font-family: 'Poppins', sans-serif;
        }

        .nav {
            background: rgba(30, 58, 138, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            text-align: center;
        }

        .nav a {
            color: #e2e8f0;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav a:hover {
            color: #FBBF24;
        }

        .container {
            padding: 30px 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            margin-top: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-bottom: 3px solid #2563EB;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #2563EB;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            background-color: #1d4ed8;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.6);
            transform: translateY(-2px);
        }

        a {
            color: #60a5fa;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
            color: #93c5fd;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Admin Dashboard</h1>
    </div>
    <div class="nav">
        <a href="{{ url_for('admin_dashboard') }}">Home</a>
        <a href="{{ url_for('admin_queries') }}">Unanswered Queries</a>
        <a href="{{ url_for('admin_manage_faq') }}">Manage FAQs</a>
        <a href="{{ url_for('admin_upload_documents') }}">Upload Documents</a>
        <a href="{{ url_for('admin_analytics') }}">Analytics</a>
        <a href="{{ url_for('admin_logout') }}" style="color: #ffcccb;">Logout</a>
    </div>
    <div class="container">
        <div class="card">
            <h2>Welcome, Admin!</h2>
            <p>Select an option from the menu or click below to view pending queries.</p>
            <a href="{{ url_for('admin_queries') }}" class="btn">View Unanswered Queries</a>
            <a href="{{ url_for('admin_manage_faq') }}" class="btn"
                style="background-color: #007bff; margin-left: 10px;">Manage FAQs</a>
        </div>
        <div class="card">
            <h3>System Status</h3>
            <p>Chatbot is running.</p>
            <p><a href="{{ url_for('home') }}" target="_blank">Go to Chatbot Interface</a></p>
        </div>
    </div>
</body>

</html>
