<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Pallavi Engineering College</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-box {
            max-width: 400px;
            margin: 5rem auto;
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .login-box h2 {
            color: var(--primary-color);
            margin-bottom: 2rem;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        .login-btn {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
        }

        .login-btn:hover {
            background: var(--secondary-color);
        }

        .error {
            color: #d9534f;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-brand">
            <h1>PALLAVI ENGINEERING COLLEGE</h1>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('helpdesk') }}">Student Helpdesk</a></li>
            <li><a href="{{ url_for('admin_login') }}" class="active">Admin Login</a></li>
        </ul>
    </nav>

    <div class="login-box">
        <h2>Admin Authentication</h2>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <p class="error">{{ message }}</p>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" class="form-input" required>
            <input type="password" name="password" placeholder="Password" class="form-input" required>
            <button type="submit" class="login-btn">Secure Login</button>
        </form>
    </div>

</body>

</html>
